services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: expense-app
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    networks:
      - expense-tracker

  nginx:
    image: nginx:1.25-alpine
    container_name: expense-nginx
    ports:
      - "8090:80"
    volumes:
      - ./:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - expense-tracker

  mysql:
    image: mysql:8.0
    container_name: expense-mysql
    ports:
      - "3311:3306"
    environment:
      MYSQL_DATABASE: expense_tracker
      MYSQL_USER: app
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: secret
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - expense-tracker

  redis:
    image: redis:7-alpine
    container_name: expense-redis
    ports:
      - "6381:6379"
    networks:
      - expense-tracker

networks:
  expense-tracker:
    driver: bridge

volumes:
  mysql-data: